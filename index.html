<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>碰碰精伶球 - 高中數學篇</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            color: white;
            user-select: none;
        }
        canvas { display: block; }

        /* --- UI 層 --- */
        #hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .score-box {
            font-size: 4vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #p1-score-box { color: #00f3ff; text-shadow: 0 0 20px #00f3ff; }
        #p2-score-box { color: #ff0055; text-shadow: 0 0 20px #ff0055; }
        .player-label { font-size: 1.5vw; opacity: 0.8; }

        #timer-box {
            font-size: 5vw;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 5px 30px;
            border-radius: 0 0 20px 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: none;
            text-shadow: 0 0 10px white;
            min-width: 120px;
            text-align: center;
        }
        .timer-warning { color: #ff3333 !important; animation: pulse 0.5s infinite; }

        #question-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            transition: top 0.3s;
        }
        #question-text {
            display: inline-block;
            font-size: 3.5vw;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 15px 60px;
            border-radius: 50px;
            border: 2px solid rgba(255,255,255,0.2);
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .bumper-mode-q { top: 18% !important; transform: translate(-50%, 0) !important; }

        /* --- 遊戲覆蓋層 --- */
        #overlay {
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 16, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .screen-content { text-align: center; width: 100%; }

        /* 結算佈局調整 */
        .result-container {
            display: flex; width: 92%; height: 92%; 
            gap: 20px; margin: auto;
        }
        .result-col {
            flex: 1; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 15px;
            display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .result-p1 { border-color: #00f3ff; box-shadow: 0 0 20px rgba(0,243,255,0.2); }
        .result-p2 { border-color: #ff0055; box-shadow: 0 0 20px rgba(255,0,85,0.2); }
        .result-center { flex: 1.4; background: rgba(0,0,0,0.3); } 

        h2 { margin: 0 0 10px 0; font-size: 2.2vw; text-transform: uppercase; }
        .big-score { font-size: 8vw; font-weight: 900; margin: auto; }
        
        /* 排行榜列表優化 */
        .leaderboard-list {
            width: 100%; text-align: left; 
            font-size: 1.0vw; 
            color: #ccc;
            overflow-y: hidden; 
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }
        .lb-item {
            display: flex; justify-content: space-between; 
            padding: 4px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            align-items: center;
        }
        .lb-rank { width: 25px; font-weight: bold; color: #ffcc00; }
        .lb-name { flex: 1; text-align: center;}
        .lb-score { width: 50px; text-align: right; color: white; }

        #winner-input-section, #replay-btn-section {
            margin-top: 10px !important;
            margin-bottom: 5px;
        }

        input {
            background: transparent; border: 2px solid white; color: white;
            font-size: 1.8vw; padding: 5px; text-align: center; width: 180px;
            text-transform: uppercase; border-radius: 10px;
        }
        
        button {
            margin-top: 10px; padding: 8px 30px; font-size: 1.6vw;
            background: white; border: none; font-weight: bold; cursor: pointer;
            border-radius: 50px; box-shadow: 0 0 20px rgba(255,255,255,0.5);
            transition: all 0.2s; pointer-events: auto;
        }
        button:hover { transform: scale(1.1); box-shadow: 0 0 40px rgba(255,255,255,0.8); }

        #gp-status-indicator {
            position: absolute;
            bottom: 10px; left: 20px;
            font-size: 1vw; color: rgba(255,255,255,0.5); font-family: monospace;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="hud">
        <div class="top-bar">
            <div class="score-box" id="p1-score-box">
                <span class="player-label">P1 藍隊</span>
                <span id="p1-score">0</span>
            </div>
            <div id="timer-box">60</div>
            <div class="score-box" id="p2-score-box">
                <span class="player-label">P2 紅隊</span>
                <span id="p2-score">0</span>
            </div>
        </div>
        
        <div id="question-container" class="bumper-mode-q">
            <div id="question-text">準備開始...</div>
        </div>
    </div>

    <div id="gp-status-indicator"></div>

    <div id="overlay">
        <div id="start-screen" class="screen-content">
            <h1 style="font-size:5vw; color:white; text-shadow:0 0 30px #00f3ff; margin-bottom:10px;">
                碰碰精伶球 - 高中數學
            </h1>
            <p style="font-size:1.5vw; color:#aaa; margin-bottom: 40px;">
                P1: <b>WASD</b> &nbsp;|&nbsp; P2: <b>方向鍵</b>
            </p>
            <p style="color:#ffcc00; font-size: 1.3vw; background: rgba(0,0,0,0.5); display:inline-block; padding:10px 20px; border-radius:20px;">
                ⭐ 題型輪替：兩根、直線、指數、餘式、因式、不等式 [cite: 13, 15, 17, 19, 21, 23]<br>
                ⭐ 撞擊正確答案得分！
            </p>
            <br>
            <button id="start-btn">開始對戰 (按 Space)</button>
            <button id="show-lb-btn" style="margin-left: 20px; background: #222; color: #00f3ff; border: 2px solid #00f3ff;">🏆 實時排行榜</button>
        </div>

        <div id="end-screen" class="result-container" style="display:none;">
            <div class="result-col result-p1">
                <h2>P1 藍隊</h2>
                <div class="big-score" id="end-p1-score">0</div>
                <div id="p1-win-msg" style="display:none; color:#00f3ff; font-weight:bold; font-size:3vw; margin-top:20px;">WINNER</div>
            </div>

            <div class="result-col result-center">
                <h2>TOP 10 排行榜</h2>
                <div class="leaderboard-list" id="lb-list"></div>
                
                <div id="winner-input-section" style="margin-top:20px; display:none;">
                    <p style="margin:5px;">恭喜獲勝！輸入名字：</p>
                    <input type="text" id="winner-name" maxlength="5" placeholder="NAME">
                    <br>
                    <button id="submit-score-btn" style="font-size: 1.5vw; padding: 10px 30px;">儲存 (按 Enter)</button>
                </div>
                <div id="replay-btn-section" style="display:none; text-align:center;">
                    <button id="replay-btn" style="font-size: 1.5vw; padding: 10px 30px;">回開始頁 (按 Space)</button>
                </div>
            </div>

            <div class="result-col result-p2">
                <h2>P2 紅隊</h2>
                <div class="big-score" id="end-p2-score">0</div>
                <div id="p2-win-msg" style="display:none; color:#ff0055; font-weight:bold; font-size:3vw; margin-top:20px;">WINNER</div>
            </div>
        </div>
    </div>

    <div id="main-lb-modal" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); width:60%; max-width:600px; background:rgba(0,0,0,0.95); border:2px solid #00f3ff; border-radius:20px; padding:30px; z-index:200; box-shadow:0 0 40px rgba(0,243,255,0.4); text-align:center;">
        <h2 style="color:#00f3ff; font-size:2.5vw; margin-bottom:20px;">🏆 TOP 10 實時排行榜</h2>
        <div id="main-lb-list" class="leaderboard-list" style="margin-bottom:20px; max-height:40vh; overflow-y:auto; font-size: 1.5vw;"></div>
        <button id="close-lb-btn" style="font-size:1.5vw; padding:10px 30px; background: #333; color: white; border: 1px solid white;">關閉 (按 Esc)</button>
    </div>

    <script>
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzWZC3tsKiGiXXlvYQkM4aODEqwI_56mSXajbiALlV4pU3klvsZb1c7gk3LUeirOp6u/exec';

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gpStatusDiv = document.getElementById('gp-status-indicator');
        
        const ui = {
            timer: document.getElementById('timer-box'),
            qContainer: document.getElementById('question-container'),
            qText: document.getElementById('question-text'),
            p1Score: document.getElementById('p1-score'),
            p2Score: document.getElementById('p2-score'),
            overlay: document.getElementById('overlay'),
            startScreen: document.getElementById('start-screen'),
            endScreen: document.getElementById('end-screen'),
            endP1: document.getElementById('end-p1-score'),
            endP2: document.getElementById('end-p2-score'),
            inputSec: document.getElementById('winner-input-section'),
            replaySec: document.getElementById('replay-btn-section'),
            winnerInput: document.getElementById('winner-name'),
            lbList: document.getElementById('lb-list'),
            p1WinMsg: document.getElementById('p1-win-msg'),
            p2WinMsg: document.getElementById('p2-win-msg'),
            mainLbModal: document.getElementById('main-lb-modal'),
            mainLbList: document.getElementById('main-lb-list'),
            showLbBtn: document.getElementById('show-lb-btn'),
            closeLbBtn: document.getElementById('close-lb-btn')
        };

        if (document.getElementById('start-btn')) document.getElementById('start-btn').onclick = startGame;
        if (document.getElementById('submit-score-btn')) document.getElementById('submit-score-btn').onclick = submitScore;
        if (document.getElementById('replay-btn')) document.getElementById('replay-btn').onclick = () => location.reload();
        
        if (ui.showLbBtn) {
            ui.showLbBtn.onclick = () => {
                if(ui.mainLbModal) ui.mainLbModal.style.display = 'block';
                renderLeaderboard();
            };
        }
        if (ui.closeLbBtn) {
            ui.closeLbBtn.onclick = () => {
                if(ui.mainLbModal) ui.mainLbModal.style.display = 'none';
            };
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let gameState = 'start'; 
        let gameTime = 60; 
        let timerInterval = null;

        // --- 全新題目資料庫 (對應 Word 文件) ---
        const allQuestions = [
            // Type 0: 兩根之和 / 兩根之積 [cite: 14]
            [
                { q: "求 x²-5x+6=0 的兩根之和。", opts: ["1", "11", "-6", "-5", "6", "5"], ans: "5" },
                { q: "求 x²+7x-8=0 的兩根之積。", opts: ["-7", "15", "-8", "7", "8", "-1"], ans: "-8" },
                { q: "求 2x²-4x+1=0 的兩根之和。", opts: ["2", "4", "1/2", "-4", "-1/2", "-2"], ans: "2" },
                { q: "求 3x²+9x-12=0 的兩根之積。", opts: ["-3", "3", "4", "-36", "-4", "-12"], ans: "-4" },
                { q: "求 -x²+3x+10=0 的兩根之和。", opts: ["-10", "1/3", "-3", "0.3", "10", "3"], ans: "3" },
                { q: "求 x²-10=0 的兩根之和。", opts: ["2", "5", "0", "-2", "-10", "1"], ans: "0" }
            ],
            // Type 1: 直線方程 [cite: 16]
            [
                { q: "直線 y=3x-5 的斜率是____。", opts: ["5", "-3", "1/3", "3", "0", "-5"], ans: "3" },
                { q: "直線 2x+4y-8=0 的 y 截距是____。", opts: ["2", "8", "4", "-2", "-1/2", "1"], ans: "2" },
                { q: "直線 3x-y+6=0 的 x 截距是____。", opts: ["2", "3", "-2", "0", "6", "-6"], ans: "-2" },
                { q: "直線 5x+2y+10=0 的斜率是____。", opts: ["-5/2", "-10", "5/2", "-2/5", "2", "-5"], ans: "-5/2" },
                { q: "直線 y=-1/2x+4 的 y 截距是____。", opts: ["0", "-4", "8", "-1/2", "4", "2"], ans: "4" },
                { q: "直線 x-3y=0 的 x 截距是____。", opts: ["1/3", "1", "0", "3", "-3", "-1/3"], ans: "0" },
                { q: "直線 4x-6y+12=0 的斜率是____。", opts: ["-3", "-2/3", "4", "2/3", "2", "3/2"], ans: "2/3" },
                { q: "直線 2x+y=6 的 x 截距是____。", opts: ["3", "1/2", "6", "-3", "-2", "2"], ans: "3" },
                { q: "直線 y=7 的斜率是____。", opts: ["7", "未定義", "0", "-7", "1", "-1"], ans: "0" },
                { q: "直線 4x-2y-4=0 的 y 截距是____。", opts: ["1/2", "1", "-1", "2", "-2", "-1/2"], ans: "-2" }
            ],
            // Type 2: 指數 [cite: 18]
            [
                { q: "化簡 (x²y⁻³)/(2x⁻⁴) 。求 a 的值 (xᵃyᵇ)", opts: ["0", "4", "-8", "16", "8", "2"], ans: "8" },
                { q: "化簡 (x⁻¹y²)³(x⁵y⁻²) 。求 b 的值 (xᵃyᵇ)", opts: ["2", "-15", "6", "4", "-12", "8"], ans: "4" },
                { q: "化簡 x³y²(x²y⁻¹) 。求 a 的值 (xᵃyᵇ)", opts: ["4", "3", "-1", "6", "1", "5"], ans: "5" },
                { q: "化簡 (2x²y⁻¹)³ 。求 k 的值 (kxᵃyᵇ)", opts: ["8", "6", "5", "-3", "2", "-4"], ans: "8" },
                { q: "化簡 (x⁻²y³)/(x⁴y⁻²)*xy⁻¹ 。求 b 的值 (xᵃyᵇ)", opts: ["-7", "-3", "6", "4", "0", "-1"], ans: "4" },
                { q: "化簡 x⁻¹y²(x³y⁻⁴) 。求 a+b 的值", opts: ["2", "-2", "0", "-11", "5", "-9"], ans: "0" },
                { q: "化簡 x⁻³y²/(x⁻¹y³)⁻³ 。求 a 的值 (xᵃyᵇ)", opts: ["6", "-3", "3", "-6", "12", "-12"], ans: "6" },
                { q: "化簡 x³y²/(2xy⁻²)³ 。求 b 的值 (xᵃyᵇ)", opts: ["2", "10", "-2", "-1", "9", "3"], ans: "10" }
            ],
            // Type 3: 餘式定理 [cite: 20]
            [
                { q: "求 f(x)=x²+3x+5 除以 x-1 的餘數。", opts: ["5", "9", "0", "7", "1", "-1"], ans: "9" },
                { q: "求 f(x)=x³-2x+4 除以 x+2 的餘數。", opts: ["4", "0", "-12", "8", "16", "-8"], ans: "0" },
                { q: "若 f(x)=2x²-x+k 除以 x-2 餘數是 10，求 k。", opts: ["8", "-4", "0", "10", "6", "4"], ans: "4" },
                { q: "求 f(x)=3x³+1 除以 x+1 的餘數。", opts: ["4", "-2", "2", "0", "1", "-4"], ans: "-2" },
                { q: "求 f(x)=x¹⁰⁰-1 除以 x+1 的餘數。", opts: ["-2", "1", "100", "-1", "2", "0"], ans: "0" },
                { q: "求 f(x)=x³+x²-2x+1 除以 x 的餘數。", opts: ["2", "1", "3", "4", "0", "-1"], ans: "1" },
                { q: "若 f(x)=x²+5x+k 除以 x+2 餘數是 -1，求 k。", opts: ["7", "0", "5", "11", "-5", "-7"], ans: "5" },
                { q: "求 f(x)=x⁴-x²+x 除以 x-1 的餘數。", opts: ["3", "1", "0", "2", "-3", "-1"], ans: "1" },
                { q: "已知 f(x)=x³-kx+2。若 f(-1)=5，求 k。", opts: ["6", "4", "2", "8", "-4", "0"], ans: "4" },
                { q: "已知 f(x)=ax²+bx+c。若 f(0)=3，求 c。", opts: ["3", "0", "6", "-3", "1", "-1"], ans: "3" }
            ],
            // Type 4: 因式定理 [cite: 22]
            [
                { q: "已知 x-1 是 f(x)=x²+kx-4 的因式，求 k。", opts: ["0", "5", "3", "1", "4", "-3"], ans: "3" },
                { q: "已知 x+3 是 f(x)=x²+kx+6 的因式，求 k。", opts: ["-5", "3", "5", "15", "0", "2"], ans: "5" },
                { q: "若 f(x)=kx²+x-2 能被 x-1 整除，求 k。", opts: ["3", "-2", "1", "-1", "2", "0"], ans: "1" },
                { q: "已知 x-2 是 f(x)=x³-4x+k 的因式，求 k。", opts: ["4", "0", "-8", "16", "8", "-4"], ans: "0" },
                { q: "已知 x+1 是 f(x)=kx²+3x+1 的因式，求 k。", opts: ["-2", "2", "-4", "3", "1", "4"], ans: "2" },
                { q: "已知 x-3 是 f(x)=x²-5x+k 的因式，求 k。", opts: ["9", "6", "0", "2", "15", "-6"], ans: "6" },
                { q: "已知 x+1 是 f(x)=kx³+2x²+5 的因式，求 k。", opts: ["5", "-3", "1", "-7", "7", "3"], ans: "7" },
                { q: "已知 x+1 是 f(x)=kx⁹⁹-2x+1 的因式，求 k。", opts: ["-3", "3", "1", "-1", "0", "-2"], ans: "-3" },
                { q: "已知 f(x)=2x³+kx-3。若 f(1)=0，求 k。", opts: ["0", "3", "-1", "5", "-5", "1"], ans: "1" },
                { q: "已知 f(x)=kx³-2x+6。若 f(-1)=0，求 k。", opts: ["-2", "0", "-8", "8", "-4", "4"], ans: "8" }
            ],
            // Type 5: 不等式 [cite: 24]
            [
                { q: "若 -x+5>2，求 x 的最大整數解。", opts: ["-3", "1", "3", "7", "-7", "2"], ans: "2" },
                { q: "若 x-12≤-6，則 x 有多少個正整數解？", opts: ["5", "7", "18", "6", "0", "17"], ans: "6" },
                { q: "若 -2x+3≤9，求 x 的最小整數解。", opts: ["-2", "-4", "6", "-3", "3", "0"], ans: "-3" },
                { q: "若 3x<10，則 x 有多少個正整數解？", opts: ["3", "4", "7", "0", "2", "10"], ans: "3" },
                { q: "若 -x-4≥-1，求 x 的最大整數解。", opts: ["-2", "-4", "5", "3", "-3", "0"], ans: "-3" },
                { q: "若 2x+7<3，求 x 的最大整數解。", opts: ["-3", "-6", "-2", "2", "-4", "5"], ans: "-3" },
                { q: "若 -5-x<0，則 x 有多少個負整數解？", opts: ["4", "5", "6", "0", "-4", "-5"], ans: "4" },
                { q: "若 3x-10>11，則 x 有多少個負整數解？", opts: ["0", "7", "8", "1", "6", "4"], ans: "0" }
            ]
        ];

        let currentTypeIndex = 0;

        const players = {
            p1: { x: window.innerWidth * 0.2, y: window.innerHeight * 0.5, r: 25, color: '#00f3ff', score: 0, vx: 0, vy: 0, keys: {u:'w', d:'s', l:'a', r:'d'} },
            p2: { x: window.innerWidth * 0.8, y: window.innerHeight * 0.5, r: 25, color: '#ff0055', score: 0, vx: 0, vy: 0, keys: {u:'ArrowUp', d:'ArrowDown', l:'ArrowLeft', r:'ArrowRight'} }
        };
        const keysPressed = {};
        
        window.addEventListener('keydown', (e) => {
            keysPressed[e.key] = true;
            if (e.code === 'Space' || e.key === ' ') {
                if (gameState === 'start') { 
                    e.preventDefault(); 
                    let isModalOpen = ui.mainLbModal && ui.mainLbModal.style.display === 'block';
                    if (!isModalOpen) startGame(); 
                } 
                else if (gameState === 'end' && ui.replaySec && ui.replaySec.style.display !== 'none') { 
                    e.preventDefault(); 
                    location.reload(); 
                }
            }
            if (e.code === 'Enter') {
                if (gameState === 'end' && ui.inputSec && ui.inputSec.style.display !== 'none') { submitScore(); }
            }
            if (e.code === 'Escape') {
                if (ui.mainLbModal && ui.mainLbModal.style.display === 'block') ui.mainLbModal.style.display = 'none';
            }
        });
        window.addEventListener('keyup', (e) => keysPressed[e.key] = false);

        window.addEventListener("gamepadconnected", updateGamepadStatus);
        window.addEventListener("gamepaddisconnected", updateGamepadStatus);

        function updateGamepadStatus() {
            const gps = navigator.getGamepads ? navigator.getGamepads() : [];
            let active = 0;
            if(gps[0]) active++;
            if(gps[1]) active++;
            if(active > 0 && gpStatusDiv) gpStatusDiv.innerHTML = `🎮 已連接 ${active} 支控制器`;
            else if(gpStatusDiv) gpStatusDiv.innerHTML = "";
        }

        let gamepadBtnPressed = { p1: false, p2: false };
        let targets = [];
        let particles = [];
        let floatingTexts = [];
        let shakeFrames = 0;

        function startGame() {
            if (gameState === 'playing') return;

            players.p1.score = 0; players.p2.score = 0;
            players.p1.x = canvas.width * 0.2; players.p1.y = canvas.height * 0.5;
            players.p2.x = canvas.width * 0.8; players.p2.y = canvas.height * 0.5;
            players.p1.vx = 0; players.p1.vy = 0;
            players.p2.vx = 0; players.p2.vy = 0;
            
            gameTime = 90; 
            currentTypeIndex = 0;
            
            if (ui.timer) ui.timer.classList.remove('timer-warning');
            if (ui.startScreen) ui.startScreen.style.display = 'none';
            if (ui.endScreen) ui.endScreen.style.display = 'none';
            if (ui.overlay) ui.overlay.style.display = 'none';
            if (ui.qContainer) ui.qContainer.classList.add('bumper-mode-q');
            
            updateScoreUI();
            
            gameState = 'playing';
            generateQuestion(); 
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(gameTimerLogic, 1000);
        }

        function gameTimerLogic() {
            if (gameState !== 'playing') return;
            gameTime--;
            if (ui.timer) ui.timer.innerText = gameTime;
            
            if (gameTime <= 10 && ui.timer) ui.timer.classList.add('timer-warning');
            if (gameTime <= 0) endGame();
        }

        function generateQuestion() {
            let typeArray = allQuestions[currentTypeIndex];
            let qObj = typeArray[Math.floor(Math.random() * typeArray.length)];

            if (ui.qText) ui.qText.innerText = qObj.q;

            spawnBallsFromOptions(qObj.opts, qObj.ans);

            // 推進到下一個題型，循環
            currentTypeIndex = (currentTypeIndex + 1) % allQuestions.length;
        }

        function spawnBallsFromOptions(opts, ans) {
            targets = [];
            let vals = [...opts];
            vals.sort(() => Math.random() - 0.5); // 洗牌
            
            vals.forEach(v => {
                targets.push({ 
                    type: 'ball', 
                    x: Math.random()*(canvas.width-150)+75, 
                    y: Math.random()*(canvas.height-300)+250, 
                    r: 45, 
                    val: v, 
                    isCorrect: v === ans, 
                    vx: (Math.random()-0.5)*3, 
                    vy: (Math.random()-0.5)*3 
                });
            });
        }

        function updatePhysics() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            if(gameState === 'playing' || gameState === 'start') updateGamepadStatus();

            const deadzone = 0.2;
            let p1ax = 0, p1ay = 0;
            if (keysPressed['a']) p1ax = -1;
            if (keysPressed['d']) p1ax = 1;
            if (keysPressed['w']) p1ay = -1;
            if (keysPressed['s']) p1ay = 1;
            if (gamepads[0]) {
                if (Math.abs(gamepads[0].axes[0]) > deadzone) p1ax = gamepads[0].axes[0];
                if (Math.abs(gamepads[0].axes[1]) > deadzone) p1ay = gamepads[0].axes[1];
            }
            players.p1.vx += p1ax * 0.75; 
            players.p1.vy += p1ay * 0.75;

            let p2ax = 0, p2ay = 0;
            if (keysPressed['ArrowLeft']) p2ax = -1;
            if (keysPressed['ArrowRight']) p2ax = 1;
            if (keysPressed['ArrowUp']) p2ay = -1;
            if (keysPressed['ArrowDown']) p2ay = 1;
            if (gamepads[1]) {
                if (Math.abs(gamepads[1].axes[0]) > deadzone) p2ax = gamepads[1].axes[0];
                if (Math.abs(gamepads[1].axes[1]) > deadzone) p2ay = gamepads[1].axes[1];
            }
            players.p2.vx += p2ax * 0.75; 
            players.p2.vy += p2ay * 0.75;

            [players.p1, players.p2].forEach(p => {
                p.vx *= 0.92; p.vy *= 0.92;
                p.x += p.vx; p.y += p.vy;
                if(p.x<p.r) {p.x=p.r; p.vx*=-0.5;}
                if(p.x>canvas.width-p.r) {p.x=canvas.width-p.r; p.vx*=-0.5;}
                if(p.y<p.r+100) {p.y=p.r+100; p.vy*=-0.5;}
                if(p.y>canvas.height-p.r) {p.y=canvas.height-p.r; p.vy*=-0.5;}
            });

            let dx = players.p2.x - players.p1.x, dy = players.p2.y - players.p1.y;
            let dist = Math.hypot(dx, dy);
            if(dist < players.p1.r + players.p2.r) {
                let angle = Math.atan2(dy, dx);
                let push = 15.0; 
                let px = Math.cos(angle)*push, py = Math.sin(angle)*push;
                players.p1.vx -= px; players.p1.vy -= py;
                players.p2.vx += px; players.p2.vy += py;
                let overlap = (players.p1.r + players.p2.r - dist) / 2 + 1;
                players.p1.x -= Math.cos(angle)*overlap; players.p1.y -= Math.sin(angle)*overlap;
                players.p2.x += Math.cos(angle)*overlap; players.p2.y += Math.sin(angle)*overlap;
                shakeScreen(10); 
            }

            updateBumperLogic();
        }

        function updateBumperLogic() {
            [players.p1, players.p2].forEach(p => {
                for(let i=targets.length-1; i>=0; i--) {
                    let t = targets[i];
                    if(t.type !== 'ball') continue;
                    // 加入摩擦力，數值 0.98 代表每幀速度剩下 98%，可以避免它無限期高速亂飛
                    t.vx *= 0.98; 
                    t.vy *= 0.98; 
                    // 如果速度太慢，就給它一點點隨機動力，保持畫面的動態感
                    if(Math.abs(t.vx) < 0.2) t.vx += (Math.random()-0.5)*0.5;
                    if(Math.abs(t.vy) < 0.2) t.vy += (Math.random()-0.5)*0.5;
                    t.x+=t.vx; t.y+=t.vy;
                    if(t.x<t.r||t.x>canvas.width-t.r) t.vx*=-1;
                    if(t.y<t.r+10||t.y>canvas.height-t.r) t.vy*=-1;
                    let d = Math.hypot(p.x - t.x, p.y - t.y);
                    if(d < p.r + t.r) {
                        if(t.isCorrect) {
                            p.score = parseFloat((p.score + 10).toFixed(1)); 
                            spawnParticles(t.x, t.y, '#00ff00', 30);
                            spawnFloatText(t.x, t.y, "+10", p.color);
                            shakeScreen(10);
                            updateScoreUI();
                            generateQuestion(); 
                            return; 
                        } else {
                            p.score = parseFloat(Math.max(0, p.score - 1).toFixed(1));
                            spawnParticles(t.x, t.y, '#ff0000', 10);
                            spawnFloatText(t.x, t.y, "-1", '#ff0000');
                            shakeScreen(5);
                            updateScoreUI();
                            // 將反彈力度從 0.1 降低到 0.04 或 0.03（數字越小，撞擊後飛得越慢）
                            t.vx = (t.x-p.x)*0.04; 
                            t.vy = (t.y-p.y)*0.04; 
                        }
                    }
                }
            });
        }

        function draw() {
            checkGamepadButtons();
            let tx=0, ty=0;
            if(shakeFrames>0) { tx=(Math.random()-0.5)*shakeFrames; ty=(Math.random()-0.5)*shakeFrames; shakeFrames--; }
            ctx.save(); ctx.translate(tx, ty);
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth=1;
            for(let i=0; i<canvas.width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=100) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            targets.forEach(t => {
                if(t.type === 'ball') {
                    ctx.beginPath(); ctx.arc(t.x, t.y, t.r, 0, Math.PI*2);
                    ctx.fillStyle = '#222'; ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.stroke();
                    ctx.fillStyle='#fff'; 
                    let fontSize = t.val.length > 2 ? 18 : 24;
                    ctx.font=`bold ${fontSize}px Arial`; 
                    ctx.textAlign='center'; ctx.textBaseline='middle'; 
                    ctx.fillText(t.val, t.x, t.y);
                } 
            });

            [players.p1, players.p2].forEach(p => {
                ctx.shadowBlur = 15; ctx.shadowColor = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fillStyle = p.color; ctx.fill();
                let angle = (Math.abs(p.vx)<0.1 && Math.abs(p.vy)<0.1) ? -Math.PI/2 : Math.atan2(p.vy, p.vx);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath(); ctx.arc(p.x+Math.cos(angle)*15, p.y+Math.sin(angle)*15, 8, 0, Math.PI*2);
                ctx.fill(); ctx.shadowBlur = 0;
            });

            particles.forEach((p, i) => {
                p.x+=p.vx; p.y+=p.vy; p.life-=0.05;
                if(p.life>0) {ctx.globalAlpha=p.life; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,5,5);} else particles.splice(i,1);
            });
            ctx.globalAlpha=1;
            floatingTexts.forEach((ft, i) => {
                ft.y-=1; ft.life-=0.02;
                if(ft.life>0) {ctx.globalAlpha=ft.life; ctx.font="bold 30px Arial"; ctx.fillStyle=ft.color; ctx.fillText(ft.text, ft.x, ft.y);} else floatingTexts.splice(i,1);
            });
            ctx.globalAlpha=1;
            ctx.restore();
        }

        function checkGamepadButtons() {
            const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            [0, 1].forEach(idx => {
                const gp = gamepads[idx];
                if (gp) {
                    const btnPressed = gp.buttons[0].pressed || gp.buttons[9].pressed || gp.buttons[1].pressed;
                    const playerId = idx === 0 ? 'p1' : 'p2';
                    if (btnPressed && !gamepadBtnPressed[playerId]) {
                        if (gameState === 'start') startGame();
                        else if (gameState === 'end') {
                            if (ui.inputSec && ui.inputSec.style.display === 'block') submitScore();
                            else if (ui.replaySec && ui.replaySec.style.display === 'block') location.reload();
                        }
                        gamepadBtnPressed[playerId] = true;
                    } else if (!btnPressed) gamepadBtnPressed[playerId] = false;
                }
            });
        }

        function endGame() {
            gameState = 'end';
            clearInterval(timerInterval);
            
            if (ui.overlay) ui.overlay.style.display = 'flex'; 
            if (ui.startScreen) ui.startScreen.style.display = 'none'; 
            if (ui.endScreen) ui.endScreen.style.display = 'flex'; 
            
            if (ui.endP1) ui.endP1.innerText = players.p1.score.toFixed(1); 
            if (ui.endP2) ui.endP2.innerText = players.p2.score.toFixed(1);
            if (ui.p1WinMsg) ui.p1WinMsg.style.display = 'none'; 
            if (ui.p2WinMsg) ui.p2WinMsg.style.display = 'none';
            
            let p1s = players.p1.score, p2s = players.p2.score;
            if (p1s > p2s) { 
                if (ui.p1WinMsg) ui.p1WinMsg.style.display = 'block'; 
                showWinnerInput(p1s); 
            }
            else if (p2s > p1s) { 
                if (ui.p2WinMsg) ui.p2WinMsg.style.display = 'block'; 
                showWinnerInput(p2s); 
            }
            else { 
                if (ui.inputSec) ui.inputSec.style.display = 'none'; 
                if (ui.replaySec) ui.replaySec.style.display = 'block'; 
            }
            
            renderLeaderboard();
        }

        function showWinnerInput(score) {
            window.winningScore = score; 
            if (ui.inputSec) ui.inputSec.style.display = 'block'; 
            if (ui.replaySec) ui.replaySec.style.display = 'none';
        }

        async function submitScore() {
            let name = (ui.winnerInput && ui.winnerInput.value.toUpperCase()) || "AAA";
            if (ui.inputSec) ui.inputSec.style.display = 'none'; 
            if (ui.lbList) ui.lbList.innerHTML = '<div style="text-align:center; padding:20px;">📡 正在將分數傳送至雲端...</div>';

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify({ name: name, score: window.winningScore }), 
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
            } catch (error) {
                console.error('上傳分數失敗:', error);
            }

            if (ui.replaySec) ui.replaySec.style.display = 'block'; 
            await renderLeaderboard();
        }

        async function renderLeaderboard() {
            let loadingMsg = '<div style="text-align:center; padding:20px;">⏳ 正在載入實時排行榜...</div>';
            if(ui.lbList) ui.lbList.innerHTML = loadingMsg;
            if(ui.mainLbList) ui.mainLbList.innerHTML = loadingMsg;
            
            try {
                let response = await fetch(WEB_APP_URL);
                let lb = await response.json();
                
                let html = ''; 
                for(let i=0; i<10; i++) { 
                    let item = lb[i] || {name:'-', score:'-'}; 
                    let scoreDisplay = item.score !== '-' ? Number(item.score).toFixed(1) : '-';
                    html += `<div class="lb-item"><span class="lb-rank">${i+1}.</span><span class="lb-name">${item.name}</span><span class="lb-score">${scoreDisplay}</span></div>`; 
                }
                
                if(ui.lbList) ui.lbList.innerHTML = html; 
                if(ui.mainLbList) ui.mainLbList.innerHTML = html;
                
            } catch (error) {
                console.error('獲取排行榜失敗:', error);
                let errMsg = '<div style="text-align:center; padding:20px; color:#ff3333;">❌ 無法連接雲端伺服器</div>';
                if(ui.lbList) ui.lbList.innerHTML = errMsg;
                if(ui.mainLbList) ui.mainLbList.innerHTML = errMsg;
            }
        }

        function spawnParticles(x, y, color, count) { for(let i=0; i<count; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:1.0, color}); }
        function spawnFloatText(x, y, text, color) { floatingTexts.push({x, y, text, color, life:1.0}); }
        function shakeScreen(n) { shakeFrames = n; }
        function updateScoreUI() { 
            if (ui.p1Score) ui.p1Score.innerText = players.p1.score.toFixed(1); 
            if (ui.p2Score) ui.p2Score.innerText = players.p2.score.toFixed(1); 
        }

        function gameLoop() {
            if (gameState === 'playing') updatePhysics();
            draw();
            requestAnimationFrame(gameLoop);
        }

        renderLeaderboard();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
